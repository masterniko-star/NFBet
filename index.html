<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="color-scheme" content="light">
<meta name="supported-color-schemes" content="light">
<title>מונדיאל 2026</title>
<style>
  :root{ color-scheme:light only; --ink:#0b1f3a;--ink2:#16335a;--pitch:#178a4c;--pitch-d:#0f6b3a;--gold:#d9a521;--red:#d64545;
    --bg:#f4f6f8;--card:#fff;--line:#e6eaef;--tx:#13202e;--mut:#13202e;--mut2:#9aa7b6;--blue:#6f9bd9;
    --r:14px;--sh:0 1px 2px rgba(11,31,58,.06),0 6px 18px rgba(11,31,58,.06);--tap:48px;--safe-b:env(safe-area-inset-bottom,0px); }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg)}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Heebo","Arial Hebrew",Arial,sans-serif;
    background:var(--bg);color:var(--tx);font-size:17px;line-height:1.45;-webkit-font-smoothing:antialiased;
    padding-bottom:calc(var(--tap) + 24px + var(--safe-b))}
  .num{font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:plaintext;display:inline-block}
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.01em}
  button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:18px}
  header{position:sticky;top:0;z-index:30;background:var(--card);color:var(--tx);border-bottom:1px solid var(--line);
    padding:7px 16px;padding-top:calc(7px + env(safe-area-inset-top,0px));box-shadow:0 2px 10px rgba(11,31,58,.06)}
  .h-top{display:flex;align-items:center;gap:8px}
  #conn{margin-inline-start:auto}
  .h-title{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
  .h-title small{display:block;font-weight:600;color:var(--mut);font-size:13px;margin-top:1px}
  .dot{width:9px;height:9px;border-radius:50%;background:#4ade80;display:inline-block;margin-inline-start:6px}
  .dot.off{background:#f87171}
  .scoreboard{display:flex;gap:10px;margin-top:12px}
  .scoreboard:empty{margin-top:0}
  .sb{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px 11px;display:grid;grid-template-rows:auto 1fr;justify-items:center;text-align:center;gap:4px}
  .sb .lab{font-size:11px;color:var(--mut);font-weight:700}
  .sb .val{font-size:16px;font-weight:800;margin-top:0;align-self:center}
  .sb .val.gold{color:var(--gold)}
  main{padding:9px 14px 4px;max-width:760px;margin:0 auto}
  .view{display:none}.view.active{display:block}
  .section-h{display:flex;align-items:baseline;justify-content:space-between;margin:4px 2px 10px}
  .section-h h2{font-size:20px}.section-h .hint{font-size:14px;color:var(--mut)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:9px;overflow:hidden}
  .helpwrap{direction:rtl;text-align:right;padding:20px 18px 26px;color:var(--tx);font-size:14.5px;line-height:1.75}
  .helpwrap h1{font-size:20px;font-weight:800;color:var(--ink);margin:0 0 10px;line-height:1.3}
  .helpwrap .lead{margin:0 0 2px}
  .helpwrap h2{font-size:16px;font-weight:800;color:var(--ink);margin:22px 0 9px;padding-bottom:6px;border-bottom:2px solid var(--line)}
  .helpwrap h3{font-size:14.5px;font-weight:800;color:var(--ink2);margin:15px 0 6px}
  .helpwrap p{margin:9px 0}
  .helpwrap ul,.helpwrap ol{margin:8px 0;padding-right:1.35em;padding-left:0}
  .helpwrap li{margin:6px 0}
  .helpwrap .tight li{margin:1px 0}
  .helpwrap strong{font-weight:800;color:var(--ink)}
  .helpwrap .ex{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px 15px;margin:13px 0}
  .helpwrap .ex>p:first-child{margin-top:0}.helpwrap .ex>p:last-child{margin-bottom:0}
  .helpwrap .ex ul{margin:7px 0}
  .helpwrap .note{background:rgba(217,165,33,.10);border-right:4px solid var(--gold);border-radius:0 10px 10px 0;padding:11px 15px;margin:14px 0}
  .helpwrap .note>p:first-child{margin-top:0}.helpwrap .note>p:last-child{margin-bottom:0}
  .helpwrap .tipbox{background:rgba(23,138,76,.10);border-right:4px solid var(--pitch);border-radius:0 10px 10px 0;padding:11px 15px;margin:14px 0}
  .helpwrap .hver{margin-top:20px;font-size:12px;color:var(--mut2);text-align:center}
  .helpwrap .helptbl{border-collapse:collapse;margin:10px 0}
  .helpwrap .helptbl td{border:none;padding:5px 10px;text-align:right;vertical-align:middle;white-space:nowrap}
  .helpwrap .helptbl td.arr{text-align:center;color:var(--mut2);padding:5px 6px}
  .helpwrap .helptbl td.nt{color:var(--mut2);font-size:13px;white-space:normal}
  .boot-load{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:14px;color:var(--mut2);font-size:14px;font-weight:700}
  .boot-spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--ink);border-radius:50%;animation:bootspin .8s linear infinite}
  @keyframes bootspin{to{transform:rotate(360deg)}}
  .helptabs{display:flex;gap:6px;margin:0 0 16px;background:var(--line);padding:4px;border-radius:13px}
  .helptabs .helptab{flex:1;border:0;background:transparent;padding:10px 6px;border-radius:9px;font-size:14px;font-weight:800;color:var(--mut2);cursor:pointer;font-family:inherit}
  .helptabs .helptab.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(11,31,58,.13)}
  .card-p{padding:14px}
  .row{display:flex;align-items:center;gap:10px}.grow{flex:1;min-width:0}
  .muted{color:var(--mut)}.small{font-size:14.5px}.tiny{font-size:13px}
  .ellip{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pos{color:var(--tx)}.neg{color:var(--red)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;height:var(--tap);padding:0 16px;border-radius:12px;font-weight:700;background:var(--ink);color:#fff}
  .btn:active{transform:scale(.985)}.btn.block{display:flex;width:100%}
  .btn.pitch{background:var(--pitch)}.btn.gold{background:var(--gold);color:#3a2c00}
  .btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
  .btn.danger{background:transparent;color:var(--red);border:1.5px solid color-mix(in srgb,var(--red) 35%,transparent)}
  .btn.sm{height:38px;padding:0 12px;font-size:15.5px;border-radius:10px}
  .btn[disabled]{opacity:.45;pointer-events:none}
  .field{margin-bottom:11px}
  .field label{display:block;font-size:14px;font-weight:700;color:var(--mut);margin:0 2px 5px}
  .input,select.input{width:100%;height:var(--tap);padding:0 13px;border:1.5px solid var(--line);border-radius:12px;background:var(--card);color:var(--tx)}
  .input:focus{outline:none;border-color:var(--ink2)}
  textarea.input{height:auto;padding:11px 13px;line-height:1.6}
  .pwwrap{position:relative;display:block}
  .pwwrap>.input{padding-left:42px}
  .pweye{position:absolute;left:3px;top:0;height:100%;width:38px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;padding:0;margin:0;font-size:18px;line-height:1;cursor:pointer;color:var(--mut);-webkit-tap-highlight-color:transparent}
  .pweye:focus{outline:none}
  .two{display:flex;gap:9px}.two>*{flex:1}
  .two.tight{gap:8px}.two.tight .field{margin-bottom:7px}
  .field.c label{margin:0 2px 3px;font-size:13px}
  .cfg2{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start;direction:rtl}
  .cfg2col{flex:1 1 230px;min-width:0}
  .input.sm{height:42px}
  .panel-h{background:none;border:none;padding:0;margin:0;display:block;width:100%;cursor:pointer;color:inherit;font-family:inherit;text-align:right}
  .panel-h .panel-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .panel-h .panel-t{font-size:16px;font-weight:800;line-height:1.2;flex:1;min-width:0}
  .panel-h .panel-chev{flex:none;font-size:12px;line-height:1.2;padding-top:3px;color:var(--mut)}
  .panel-h .panel-status{margin-top:7px;font-size:12px;text-align:right;line-height:1.45;overflow-wrap:break-word}
  .lsub{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:#fff;overflow:hidden}
  .lsub-h{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;background:none;border:none;cursor:pointer;color:inherit;font-family:inherit;text-align:right;padding:11px 13px}
  .lsub-t{font-size:14.5px;font-weight:800}
  .lsub-r{display:flex;align-items:center;gap:8px;font-size:12px;white-space:nowrap}
  .lsub-b{padding:0 13px 12px}
  .lsub-acts{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}
  .logscroll{max-height:240px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:10px;padding:2px 8px;direction:ltr;text-align:left}
  .btn.sm{height:36px;padding:0 14px;font-size:13px;border-radius:10px;font-weight:700}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;padding:3px 9px;border-radius:999px}
  .pill.open{background:color-mix(in srgb,var(--gold) 18%,transparent);color:#946b00}
  .pill.done{background:color-mix(in srgb,var(--pitch) 16%,transparent);color:var(--pitch-d)}
  .pill.wait{background:var(--line);color:var(--mut)}
  .p-item{display:flex;flex-direction:column;align-items:stretch;gap:9px;padding:12px 14px;border-bottom:1px solid var(--blue)}
  .p-top{display:flex;align-items:center;gap:11px}
  .p-top .pname{flex:0 1 auto;min-width:0;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .p-fill{flex:1 1 auto;min-width:0}
  .addinfo{font-size:12.5px;color:var(--mut2);padding:11px 14px;border-bottom:1px solid var(--blue);line-height:1.45}
  .addrow{display:flex;align-items:center;gap:9px;justify-content:flex-start}
  .addrow .bf{direction:ltr;width:96px;height:26px;border:1px solid var(--blue);border-radius:8px;padding:0 8px;font-size:14px;font-weight:700;font-family:inherit;background:var(--bg);color:var(--ink);text-align:center}
  .addrow .bf:focus{outline:none;border-color:var(--pitch)}
  .addrow .bf.bf-warn{border-color:var(--red)!important;background:rgba(214,69,69,.07);box-shadow:0 0 0 3px rgba(214,69,69,.16);animation:bfWarnPulse 1s ease-in-out infinite}
  @keyframes bfWarnPulse{0%,100%{box-shadow:0 0 0 3px rgba(214,69,69,.16)}50%{box-shadow:0 0 0 3px rgba(214,69,69,.34)}}
  .addrow .bf-apply{height:26px;padding:0 14px;border:0;border-radius:8px;background:var(--pitch);color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
  .addrow .bf-apply:active{filter:brightness(.93)}
  .p-item:last-child{border-bottom:none}
  .p-allhead{padding:12px 14px;border-bottom:1px solid var(--blue);background:color-mix(in srgb,var(--blue) 7%,transparent)}
  .p-allhead .allname{color:var(--ink)}
  .avatar{width:38px;height:38px;border-radius:11px;background:linear-gradient(150deg,var(--ink),var(--ink2));color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
  .fee{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;color:var(--mut)}
  .pdel{flex:0 0 auto;background:transparent;border:none;cursor:pointer;font-size:17px;line-height:1;padding:6px;border-radius:8px;opacity:.75}
  .pdel:active{background:color-mix(in srgb,var(--red) 12%,transparent);opacity:1}
  .pkey{flex:0 0 auto;background:color-mix(in srgb,var(--blue) 10%,transparent);border:1px solid var(--blue);cursor:pointer;font-size:15px;line-height:1;padding:4px 7px;border-radius:8px;white-space:nowrap;font-family:inherit;vertical-align:middle}
  .pkey:active{filter:brightness(.95)}
  .prestore{flex:0 0 auto;background:color-mix(in srgb,var(--gold) 14%,transparent);border:1px solid var(--gold);color:#946b00;cursor:pointer;font-size:12.5px;font-weight:800;line-height:1;padding:5px 10px;border-radius:8px;white-space:nowrap;font-family:inherit}
  .prestore:active{filter:brightness(.95)}
  .mdraw{width:100%;margin-top:10px;height:38px;border-radius:10px;border:1.5px dashed var(--line);background:transparent;color:var(--mut);font-weight:700;font-size:13.5px;cursor:pointer}
  .mdraw.on{border-style:solid;border-color:var(--gold);background:color-mix(in srgb,var(--gold) 18%,transparent);color:var(--tx)}
  .mdraw:disabled{opacity:.45;cursor:default}
  .checkbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;color:#fff;background:var(--card)}
  .checkbox.on{background:var(--pitch);border-color:var(--pitch)}
  .round-h{display:flex;align-items:center;gap:8px;margin:18px 2px 9px;font-size:14.5px;font-weight:800;color:var(--mut)}
  .round-h .ln{flex:1;height:1px;background:var(--line)}
  .m-head{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer}
  .teams{font-weight:800;font-size:17px}.teams .x{color:var(--mut2);font-weight:700;margin:0 7px}
  .mcard{cursor:default;position:relative}
  .mteams{display:grid;grid-template-columns:1fr auto 1fr;direction:ltr;align-items:start}
  .mteam{text-align:center;min-width:0;padding:0 10px}
  .mchkrow{display:flex;align-items:center;gap:10px;min-height:30px}
  .mtop{position:relative;display:flex;align-items:center;min-height:30px;margin-bottom:5px}
  .mchk{position:absolute;top:50%;transform:translateY(-50%);width:22px;height:22px;accent-color:var(--pitch);cursor:pointer;margin:0}
  .mchk.a{right:0}.mchk.b{left:0}
  .mchk.x{position:static;transform:none;accent-color:var(--gold)}
  .mdrawcol{padding:0 2px}
  .mtopc{justify-content:center}
  .mbtnrow{display:flex;gap:8px;margin-top:10px}
  .mbtnrow .mdraw{width:auto;margin-top:0;flex:1 1 0;min-width:0;white-space:normal;line-height:1.2;height:auto;min-height:38px;padding:6px 6px}
  .mbtnrow .mhalf{flex:2}.mbtnrow .mhalf2{flex:3}
  .mlockst{text-align:center;margin-top:12px;font-size:13px;font-weight:800;color:var(--mut)}
  .mname{flex:1;min-width:0;text-align:center;font-weight:800;font-size:18px;border:1px solid transparent;border-radius:8px;background:transparent;color:var(--tx);padding:3px 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mname:focus{outline:none;border-color:var(--line);background:var(--bg)}
  .mteams .mteam:first-child{text-align:left}
  .mteams .mteam:last-child{text-align:right}
  .mteams .mteam:first-child .mname{text-align:left;padding-right:26px}
  .mteams .mteam:last-child .mname{text-align:right;padding-left:26px}
  .mcnt{font-size:13px;color:var(--mut2);font-weight:700}
  .mauto{color:#b8860b;font-weight:800;font-size:11.5px}
  .mamt{font-size:15px;font-weight:800;color:var(--tx);margin-top:1px}
  .m-date{text-align:center;font-size:13px;color:var(--mut2);font-weight:700;margin-top:9px}
  .pool-legend b{color:var(--tx)}
  .lb-row{display:flex;align-items:center;gap:11px;padding:11px 13px;border-bottom:1px solid var(--line)}
  .lb-row:last-child{border-bottom:none}
  .rank{width:30px;text-align:center;font-weight:800;font-size:17px;color:var(--mut)}
  .lb-stats{font-size:13.5px;color:var(--mut);margin-top:1px}.lb-bal{font-weight:800;font-size:18px}.endcol{text-align:left}
  .me-row{background:color-mix(in srgb,var(--gold) 10%,transparent)}
  .row-y{background:color-mix(in srgb,var(--gold) 10%,transparent)}
  .betcard{position:relative}
  .betrow{display:grid;grid-template-columns:60px 1fr;grid-template-rows:36px 36px;gap:6px;align-items:stretch}
  .betrow .pk{min-width:0;height:100%;border:1.5px solid var(--line);border-radius:11px;background:var(--card);color:var(--tx);font-weight:800;font-size:14px;padding:0 12px;display:flex;align-items:center;justify-content:flex-start;gap:8px}
  .betrow .pk .tnum{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;border:1.5px solid currentColor;font-size:12px;font-weight:800;line-height:1}
  .betrow .pk .tnm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
  .betrow .pk .tnsp{flex:0 0 20px}
  .betrow .pk .tcoef{flex:0 0 auto;min-width:20px;text-align:center;font-size:12px;font-weight:800;line-height:1;opacity:.72;font-variant-numeric:tabular-nums}
  .betrow .pk.on-a{background:var(--pitch);border-color:var(--pitch);color:#fff}
  .betrow .pk.on-b{background:#3066b0;border-color:#3066b0;color:#fff}
  .betrow .pk.on-x{background:#48FCFE;border-color:#48FCFE;color:#063b41}
  .betrow.b3{grid-template-rows:36px 36px 36px}
  .betrow .stakein{min-width:0;height:50px;border:1.5px solid var(--line);border-radius:11px;background:var(--card);color:var(--tx);text-align:center;font-size:16px;font-weight:700;padding:0 2px}
  .betrow .stakein:focus{outline:none;border-color:var(--ink2)}
  .betrow .sendbtn{height:50px;padding:0;border-radius:11px;font-size:14px}
  .betrow .stval{width:100%;min-width:0;height:100%;border:1.5px solid var(--line);border-radius:9px;text-align:center;font-size:17px;font-weight:700;background:var(--card);color:var(--tx);padding:0;pointer-events:none;cursor:default}
  .betrow .stval:focus{outline:none;border-color:var(--ink2)}
  .betrow .strow{width:100%;min-width:0;height:100%;border:1.5px solid var(--line);border-radius:9px;background:var(--card);color:var(--tx);font-size:13px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .betrow .strow:active{background:var(--bg)}
  .betrow .strowpair{display:flex;gap:4px;min-width:0}
  .betrow .strowpair .strow{flex:1}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input[type=number]{-moz-appearance:textfield}
  .betcap{text-align:center;font-size:13px;color:var(--mut);margin-top:9px;font-weight:700}
  .betrow.submitted{opacity:.78;filter:grayscale(.2)}
  .xbtn{position:absolute;top:3px;right:3px;width:21px;height:21px;border-radius:50%;background:var(--bg);color:var(--tx);font-size:14px;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);z-index:2}
  .madd{position:absolute;top:7px;right:27px;font-size:9.5px;color:var(--mut2);font-weight:600;direction:ltr;white-space:nowrap;z-index:1}
  .okbet{margin-top:10px;background:color-mix(in srgb,var(--pitch) 14%,transparent);border:1px solid color-mix(in srgb,var(--pitch) 32%,transparent);color:var(--pitch-d);border-radius:11px;padding:10px 12px;font-weight:700;font-size:15.5px}
  .brow{display:grid;grid-template-columns:1fr 40px 34px 60px 36px;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--line);font-size:14.5px;line-height:1.15;text-align:right;font-weight:700}
  .brow span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .brow:last-child{border-bottom:none}
  .brow.bhead{font-weight:800;color:var(--tx);font-size:12px;letter-spacing:.2px;padding:6px 0 9px;border-bottom:1.5px solid var(--line)}
  .brow .bname{font-weight:700;text-align:right;font-size:13.5px}
  .brow .bpick{color:var(--mut)}
  .brow .pos{color:var(--pitch-d)}.brow .neg{color:var(--red)}
  .mtitle .tdot{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;border:1.5px solid currentColor;font-size:11px;font-weight:800;line-height:1;margin-inline-end:5px;vertical-align:middle}
  .mstack{display:inline-flex;flex-direction:column;align-items:center;min-width:0;max-width:100%}
  .mstack .mtitle{max-width:100%}
  .mtitle .nw{white-space:nowrap}
  .brow.me-row{border-radius:10px}
  .srow{display:grid;grid-template-columns:1fr 56px 56px 64px;align-items:center;gap:7px;padding:9px 1px;border-bottom:1px solid var(--line);font-size:13.5px;font-weight:700}
  .srow span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

<script>
"use strict";
/* ============================================================
   הגדרה חד-פעמית: הדבק כאן את כתובת מסד הנתונים של Firebase
   (משהו כמו https://xxxx-default-rtdb.firebaseio.com)
   ============================================================ */
var FIREBASE_URL = "https://nf-playoff-default-rtdb.europe-west1.firebasedatabase.app";
var ADMIN_CODE   = "ctrl7";   /* כתובת הניהול: הקישור + #ctrl7 */
var PUBLIC_BASE  = "https://nf-playoff.netlify.app/";  /* קישור ציבורי קבוע למשתתפים — לא ה-alias של הפיתוח */
var MAX_PLAYERS  = 30;  /* תקרת משתתפים פעילים בו-זמנית */

/* ---- mode / config ---- */
var HASH=(location.hash||"").replace(/^#/,"");
var MODE=(HASH===ADMIN_CODE)?"admin":"player";
function dbUrl(){ var u=FIREBASE_URL; if(!/^https?:\/\//.test(u)){ u=localStorage.getItem("fb_url")||""; } return u.replace(/\/+$/,""); }
var DB=dbUrl();

var ROUNDS=[{key:"R32",name:"שלב ה-32",count:16},{key:"R16",name:"שמינית הגמר",count:8},{key:"QF",name:"רבע הגמר",count:4},{key:"SF",name:"חצי הגמר",count:2},{key:"TP",name:"מקום שלישי",count:1},{key:"F",name:"הגמר",count:1}];
var ROUND_NAME={}; ROUNDS.forEach(function(r){ROUND_NAME[r.key]=r.name;});
var ROUND_ORDER={}; ROUNDS.forEach(function(r,i){ROUND_ORDER[r.key]=i;});
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function defMeta(){return{fee:100,bank:100,minBet:1,maxBet:10,cur:"₪"};}

var S={meta:defMeta(),players:[],matches:[]};
var meKey="me_"+btoa(DB||"x").slice(0,8);
var ME=localStorage.getItem(meKey)||sessionStorage.getItem(meKey)||null;
function saveMe(id,remember){try{if(remember){localStorage.setItem(meKey,id);sessionStorage.removeItem(meKey);}else{sessionStorage.setItem(meKey,id);localStorage.removeItem(meKey);}}catch(e){}}
/* ---- admin session (כניסת ניהול בסיסמה) ---- */
var SUPER_ADMINS=["ניקולאי פלדמן","ניקולאי פלדמן 2"]; /* תמיד מנהלים — אי-אפשר להסיר */
var admKey="adm_"+btoa(DB||"x").slice(0,8);
var ADMIN_ME=localStorage.getItem(admKey)||sessionStorage.getItem(admKey)||null;
function saveAdmin(id,remember){try{if(remember){localStorage.setItem(admKey,id);sessionStorage.removeItem(admKey);}else{sessionStorage.setItem(admKey,id);localStorage.removeItem(admKey);}}catch(e){}}
function clearAdmin(){try{localStorage.removeItem(admKey);sessionStorage.removeItem(admKey);}catch(e){}ADMIN_ME=null;}
var _ckSuf=String(DB||"").replace(/[^a-z0-9]/gi,"").slice(-18);
var cacheKey="nfpT_"+_ckSuf, tabCacheKey="nfpTab_"+_ckSuf;
function cacheSave(t){try{if(!t||typeof t!=="object")return;var c={},k;for(k in t){if(k!=="diag")c[k]=t[k];}localStorage.setItem(cacheKey,JSON.stringify(c));}catch(e){}}
function cacheLoad(){try{var s=localStorage.getItem(cacheKey);return s?JSON.parse(s):null;}catch(e){return null;}}
function cacheTab(t){try{localStorage.setItem(tabCacheKey,String(t||""));}catch(e){}}
function cacheTabLoad(){try{return localStorage.getItem(tabCacheKey)||null;}catch(e){return null;}}

/* ---- Firebase REST ---- */
function fbUrl(p){p=p||"";if(p[0]!=="/")p="/"+p;return DB+p+".json";}
function fbGet(p){return fetch(fbUrl(p)).then(function(r){if(!r.ok){logErr("firebase","GET "+p+" -> "+r.status);throw r.status;}return r.json();});}
var _revT=null;
function fbBump(){ if(_revT)return; _revT=setTimeout(function(){_revT=null;try{fetch(fbUrl("/rev"),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(Date.now())}).catch(function(){});}catch(e){}},300); }
function fbWrite(method,p,v,retry){var opt={method:method};if(v!==undefined){opt.headers={"Content-Type":"application/json"};opt.body=JSON.stringify(v);}
  return fetch(fbUrl(p),opt).then(function(r){if(!r.ok){logErr("firebase",method+" "+p+" -> "+r.status);throw r.status;}fbBump();return method==="DELETE"?undefined:r.json();})
  .catch(function(e){if(typeof e==="number")throw e;
    if(!retry){logWarn("firebase",method+" "+p+" רשת נכשל — ניסיון חוזר");return new Promise(function(res,rej){setTimeout(function(){fbWrite(method,p,v,true).then(res,rej);},1200);});}
    logCrit("firebase",method+" "+p+" נכשל סופית (רשת): "+((e&&e.message)||e));throw e;});}
function fbSet(p,v){return fbWrite("PUT",p,v);}
function fbUpd(p,v){return fbWrite("PATCH",p,v);}
function fbDel(p){return fbWrite("DELETE",p);}

/* ===================== ДИАГНОСТИКА / ЛОГ ОШИБОК ===================== */
var APP_VER="2026-06-30b";var AC_DEF_TIMES=["08:00","20:00"];
var LOG_KEY="nfp_log",LOG_MAX=250,_diagSeen={},_diagBuf=[],_diagT=null,_clientCrits=[];
function devId(){try{var d=localStorage.getItem("nfp_dev");if(!d){d=Date.now().toString(36)+Math.random().toString(36).slice(2,6);localStorage.setItem("nfp_dev",d);}return d;}catch(e){return "dev";}}
function logRead(){try{return JSON.parse(localStorage.getItem(LOG_KEY)||"[]");}catch(e){return [];}}
function logWrite(a){try{localStorage.setItem(LOG_KEY,JSON.stringify(a));}catch(e){}}
function logAdd(lvl,cat,msg,extra){var e={ts:Date.now(),lvl:lvl,cat:cat,msg:String(msg==null?"":msg).slice(0,400),x:extra||null,mode:(typeof MODE!=="undefined"?MODE:"?"),ver:APP_VER};
  var isNew=true;
  try{var a=logRead();var L=a[a.length-1];if(L&&L.lvl===e.lvl&&L.cat===e.cat&&L.msg===e.msg&&(e.ts-(L.ts||0))<8000){L.n=(L.n||1)+1;L.ts=e.ts;isNew=false;}else{a.push(e);if(a.length>LOG_MAX)a=a.slice(a.length-LOG_MAX);}logWrite(a);}catch(_){}
  try{((lvl==="CRIT"||lvl==="ERR")?console.error:console.warn)("[NFP]["+cat+"] "+msg,extra||"");}catch(_){}
  if(isNew&&(lvl==="CRIT"||lvl==="ERR"||lvl==="WARN")){try{diagPush(e);}catch(_){}}
  if(isNew&&lvl==="CRIT"){try{critPopupAdd(cat,msg);}catch(_){}}
  try{if(typeof TAB!=="undefined"&&TAB==="settings"&&typeof MODE!=="undefined"&&MODE==="admin"&&$("#logBox"))logRender();}catch(_){}}
function logInfo(c,m,x){logAdd("INFO",c,m,x);}function logWarn(c,m,x){logAdd("WARN",c,m,x);}function logErr(c,m,x){logAdd("ERR",c,m,x);}function logCrit(c,m,x){logAdd("CRIT",c,m,x);}
function diagPush(e){_diagBuf.push({ts:e.ts,lvl:e.lvl,cat:e.cat,msg:e.msg,ver:e.ver});if(_diagBuf.length>12)_diagBuf=_diagBuf.slice(_diagBuf.length-12);if(_diagT)return;
  _diagT=setTimeout(function(){_diagT=null;try{if(DB&&/^https?:/.test(DB))fetch(fbUrl("/diag/"+devId()),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({dev:devId(),upd:Date.now(),ua:((typeof navigator!=="undefined"&&navigator.userAgent)||"").slice(0,120),items:_diagBuf})}).catch(function(){});}catch(_){}},4000);}
function once(k,fn){if(_diagSeen[k])return;_diagSeen[k]=1;try{fn();}catch(_){}}
function runDiagnostics(){try{if(!S||!S.players)return;
  S.players.forEach(function(pp){var st;try{st=statsFor(pp.id);}catch(_){return;}if(st&&typeof st.balance==="number"){
    if(isNaN(st.balance))once("nan-"+pp.id,function(){logErr("logic","יתרה NaN: "+(pp.name||pp.id),{pid:pp.id});});
    else if(st.balance<-1e-9)once("neg-"+pp.id+"-"+Math.round(st.balance),function(){logWarn("logic","יתרה שלילית: "+(pp.name||pp.id)+" = "+st.balance.toFixed(2),{pid:pp.id,bal:Math.round(st.balance*100)/100});});}});
  S.matches.forEach(function(m){
    if(m.settled&&["A","B","X","VOID"].indexOf(m.winner)<0)once("win-"+m.id,function(){logWarn("logic","משחק סגור עם מנצח לא תקין ("+(m.teamA||"?")+"-"+(m.teamB||"?")+"): "+m.winner,{mid:m.id});});
    if(m.settled){try{var c=calcMatch(m);for(var pid in c.payouts){if(isNaN(c.payouts[pid])){once("pay-"+m.id,function(){logErr("logic","תשלום NaN במשחק "+(m.teamA||"?")+"-"+(m.teamB||"?"),{mid:m.id});});break;}}}catch(_){}}});

function statsFor(pid){var staked=0,won=0,cor=0,lost=0,push=0,pend=0;
  S.matches.forEach(function(m){var b=(m.bets||{})[pid];if(!b)return;var st=Number(b.stake)||0;staked+=st;
    if(m.settled){var c=calcMatch(m);won+=(c.payouts[pid]||0);if(c.refunded)push++;else if(b.team===m.winner)cor++;else lost++;}else pend+=st;});
  var bal=startBal(pid)-staked+won;var ss=staked-pend;var roi=ss>0?((won-ss)/ss)*100:0;
  return{balance:bal,staked:staked,won:won,correct:cor,lost:lost,push:push,pending:pend,roi:roi,net:won-ss};}
function availFor(pid,mid){var staked=0,won=0;S.matches.forEach(function(m){if(m.id===mid)return;var b=(m.bets||{})[pid];if(!b)return;staked+=Number(b.stake)||0;if(m.settled)won+=(calcMatch(m).payouts[pid]||0);});return startBal(pid)-staked+won;}

function pwHash(str){var s=String(str==null?"":str);var h1=0xdeadbeef^0x4e46,h2=0x41c6ce57^0x4e46;for(var i=0,ch;i<s.length;i++){ch=s.charCodeAt(i);h1=Math.imul(h1^ch,2654435761);h2=Math.imul(h2^ch,1597334677);}h1=Math.imul(h1^(h1>>>16),2246822507);h1^=Math.imul(h2^(h2>>>13),3266489909);h2=Math.imul(h2^(h2>>>16),2246822507);h2^=Math.imul(h1^(h1>>>13),3266489909);var n=4294967296*(2097151&h2)+(h1>>>0);return "h"+n.toString(36);}
function pwOk(pl,typed){if(!pl)return false;if(pl.pwh!=null)return String(pl.pwh)===pwHash(typed);if(pl.pw!=null)return String(pl.pw)===String(typed);return false;}

<p>הפיקדון המינימלי שווה לסכום ההימור המינימלי, כלומר טכנית אפשר להתחיל לשחק אפילו עם <strong>1 ₪</strong>. עם זאת, מומלץ להתחיל עם <strong>100 ₪</strong>, ששווים ל-10 הימורים מקסימליים. חשוב להבין: סיכויי הזכייה אינם תלויים בגודל הבלנס שלך ולא בכמה כסף כל אחד הכניס לטורניר, אלא בגודל ההימור והאם ניחשת נכון את תוצאת המשחק. הבלנס קובע רק את התקרה&nbsp;— אי-אפשר להמר על סכום גדול ממנו&nbsp;— אבל כשלעצמו אינו משפיע על הסיכוי לזכות.</p>

function betLockSignature(){return S.matches.filter(function(m){return !m.settled&&m.teamA&&m.teamB;}).map(function(m){return m.id+(matchLocked(m)?"L":"O");}).join(",");}
setInterval(function(){try{if(TAB!=="bet"||!me())return;var sig=betLockSignature();if(sig!==betLockSig){betLockSig=sig;renderBetView();}}catch(e){}},20000);
var stakeOf={};
function curStake(mid,b){ if(mid in stakeOf) return stakeOf[mid]; return b?b.stake:5; }
function clampStake(mid,n){var p=me();var avail=Math.floor(availFor(p.id,mid));var hi=Math.min(S.meta.maxBet,avail);var lo=S.meta.minBet;n=Math.floor(Number(n)||0);if(hi<lo)return 0;if(n>hi)n=hi;if(n<lo)n=lo;return n;}
function pPick(mid,team){var m=S.matches.find(function(x){return x.id===mid;});if(!m||m.settled)return;if(team==="X"&&!m.drawOK)return;if(matchLocked(m)){var w=$("#pw-"+mid);if(w)w.textContent="ההימור נסגר — המשחק כבר התחיל.";return;}var p=me();if(!p)return;if(!p.feePaid){var wd=$("#pw-"+mid);if(wd)wd.textContent="מצב דמו — יש לסמן 'שולם' כדי להמר.";return;}markEntry();var b=(m.bets||{})[p.id];
  if(b&&b.team===team){ fbDel("/bets/"+mid+"/"+p.id).then(refresh); return; }
  var stake=clampStake(mid,curStake(mid,b));if(stake<1){toast("אין מספיק יתרה");return;}
  stakeOf[mid]=stake;
  Promise.all([fbSet("/bets/"+mid+"/"+p.id,{team:team,stake:stake,t:Date.now()}),fbUpd("/players/"+p.id,{lastBet:Date.now()})]).then(refresh);}
function pStake(mid,val){var p=me();if(!p||!p.feePaid)return;var m=S.matches.find(function(x){return x.id===mid;});if(m&&matchLocked(m)){var w=$("#pw-"+mid);if(w)w.textContent="ההימור נסגר — המשחק כבר התחיל.";return;}var b=(m.bets||{})[p.id];var n=clampStake(mid,val);if(n<1)n=S.meta.minBet;stakeOf[mid]=n;
  if(b&&!m.settled){ var inp=$("#st-"+mid); if(inp)inp.value=n; Promise.all([fbSet("/bets/"+mid+"/"+p.id,{team:b.team,stake:n,t:Date.now()}),fbUpd("/players/"+p.id,{lastBet:Date.now()})]).then(refresh); } else { renderBetView(); }}
function pStep(mid,d){var p=me();if(!p||!p.feePaid)return;var m=S.matches.find(function(x){return x.id===mid;});if(m&&matchLocked(m)){var w=$("#pw-"+mid);if(w)w.textContent="ההימור נסגר — המשחק כבר התחיל.";return;}var b=(m.bets||{})[p.id];var n=clampStake(mid,curStake(mid,b)+d);if(n<1)n=S.meta.minBet;stakeOf[mid]=n;
  if(b&&!m.settled){ var inp=$("#st-"+mid); if(inp)inp.value=n; Promise.all([fbSet("/bets/"+mid+"/"+p.id,{team:b.team,stake:n,t:Date.now()}),fbUpd("/players/"+p.id,{lastBet:Date.now()})]).then(refresh); } else { renderBetView(); }}
function pDelete(mid){var m=S.matches.find(function(x){return x.id===mid;});if(!m||m.settled)return;if(matchLocked(m)){var w=$("#pw-"+mid);if(w)w.textContent="ההימור נסגר — המשחק כבר התחיל.";return;}var p=me();if(!p)return;fbDel("/bets/"+mid+"/"+p.id).then(refresh).then(function(){toast("ההימור בוטל");});}
window.pPick=pPick;window.pStake=pStake;window.pStep=pStep;window.pDelete=pDelete;

/* כותרת קבוצה: מספר ⓵/⓶ דבוק למילה הראשונה (.nw — לא נשבר); שאר המילים יכולות לרדת לשורה שנייה.
   מילה בודדת ארוכה שאינה נכנסת -> fitTitles מקטין גופן עד שתיכנס. */
function teamTitle(num,name){var nm=String(name||"").trim();var parts=nm.split(/\s+/);var first='<span class="nw"><span class="tdot">'+num+'</span>'+esc(parts.shift()||"")+'</span>';if(!parts.length)return first;/* 2+ слова: каждое следующее слово на своей строке (принудительный перенос); fitTitles дожмёт шрифт, если слово широкое */var rest=parts.map(function(w){return '<span class="nw">'+esc(w)+'</span>';}).join('<br>');return first+'<br>'+rest;}
function fitTitles(){var els=document.querySelectorAll(".mtitle");for(var i=0;i<els.length;i++){var el=els[i];if(el.clientWidth<10)continue;var size=19;el.style.fontSize="19px";var g=0;while(el.scrollWidth>el.clientWidth+1&&size>11&&g<40){size-=0.5;el.style.fontSize=size+"px";g++;}}}
window.addEventListener("resize",function(){fitTitles();});
function renderBoardView(){
  var p=me();
  var open=S.matches.filter(function(m){return !m.settled&&m.teamA&&m.teamB;});
  var betsHtml=open.map(function(m){
    var c=calcMatch(m);
    var dOK=!!m.drawOK;
    var ri=0;
    var _tOrd={A:0,X:1,B:2}; /* сортировка таблицы по колонке ניחוש: 1 (A) → X (תיקו) → 2 (B); внутри группы — порядок игроков сохраняется */
    var _betters=S.players.filter(function(pl){return (m.bets||{})[pl.id];});
    _betters.sort(function(x,y){return _tOrd[(m.bets||{})[x.id].team]-_tOrd[(m.bets||{})[y.id].team];});
    var rows=_betters.map(function(pl){
      var b=(m.bets||{})[pl.id];
      var coef=b.team==="A"?c.coefA:(b.team==="B"?c.coefB:c.coefX);var net=coef?(b.stake*coef-b.stake):0;
      var otherSum=c.pool-(b.team==="A"?c.sumA:(b.team==="B"?c.sumB:c.sumX));var hasOpp=otherSum>0;
      var pickNum=b.team==="A"?"1":(b.team==="B"?"2":"X");var zc=(ri%2===0)?" row-y":"";ri++;
      return '<div class="brow'+zc+(p&&pl.id===p.id?" me-row":"")+'"><span class="bname" dir="rtl">'+esc(pl.name)+'</span>'+
        '<span class="bpick num">'+pickNum+'</span>'+
        '<span class="num">'+fmt(b.stake)+'</span>'+
        '<span class="'+(net>0?"pos":"")+' num">'+fmt(net)+'</span>'+
        '<span class="'+(hasOpp?"neg":"")+' num">'+(hasOpp?"−"+fmt(b.stake):"0")+'</span></div>';
    }).join("");
    return '<div class="card card-p" style="margin-bottom:18px;border:1.5px solid #5b9bd5;box-shadow:0 2px 4px rgba(11,31,58,.07),0 10px 24px rgba(11,31,58,.10)">'+(m.dt?'<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:start;margin-top:-9px;margin-bottom:5px;direction:ltr"><span style="justify-self:start">'+liveClockHtml(m,'font-size:14px;line-height:1.1',true)+'</span><span style="justify-self:center">'+liveScoreHtml(m,'font-size:19px;line-height:1.1')+'</span><span dir="ltr" style="justify-self:end;font-size:14px;line-height:1.1;color:var(--mut);font-weight:800">'+esc(fmtDate(m.dt))+'</span></div>':'')+'<div style="margin-bottom:12px;background:#d6e8fb;border-radius:12px;padding:10px 12px"><div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:start;gap:4px 8px;direction:ltr"><div class="mstack" style="grid-column:1;justify-self:start"><div class="mtitle" dir="auto" style="text-align:center;font-weight:800;font-size:19px;line-height:1.15">'+teamTitle(1,m.teamA)+'</div><div class="tiny muted" dir="rtl" style="font-weight:700;margin-top:4px">קופה <span class="num">'+fmt(c.sumA)+' '+cur()+'</span></div></div><div class="mstack" style="grid-column:2;align-self:end">'+(dOK?('<span class="tiny muted" dir="rtl" style="font-weight:700;margin-top:1px">תיקו <span class="num">'+fmt(c.sumX)+'</span></span>'):'')+'</div><div class="mstack" style="grid-column:3;justify-self:end"><div class="mtitle" dir="auto" style="text-align:center;font-weight:800;font-size:19px;line-height:1.15">'+teamTitle(2,m.teamB)+'</div><div class="tiny muted" dir="rtl" style="font-weight:700;margin-top:4px">קופה <span class="num">'+fmt(c.sumB)+' '+cur()+'</span></div></div></div></div>'+
      '<div class="brow bhead"><span class="bname">משתתף</span><span class="bpick">ניחוש</span><span>₪</span><span>זכיה</span><span>הפסד</span></div>'+
      (rows||'<div class="tiny muted" style="padding:8px 2px">עדיין אין הימורים על המשחק.</div>')+'</div>';
  }).join("");
  $("#main").innerHTML='<section class="view active">'+
    (betsHtml||'<div class="card"><div class="empty"><div class="em-ic">📊</div>אין כרגע הימורים להצגה.</div></div>')+
    '</section>';
  fitTitles();
}

function renderHistView(){
  var p=me(); if(!p){renderIdentify();$("#nav").innerHTML="";return;}
  var mine=S.matches.filter(function(m){return (m.bets||{})[p.id];});
  mine.sort(function(a,b){return (a.settled?0:1)-(b.settled?0:1)||(a.order||0)-(b.order||0);});
  var fmt1=function(n){n=Number(n)||0;return Math.abs(n-Math.round(n))<1e-9?String(Math.round(n)):n.toFixed(1);};
  var totalNet=0;
  var pre=mine.map(function(m){
    var b=m.bets[p.id];var stake=Number(b.stake)||0;
    var c=calcMatch(m);var refd=c.refunded;var bcur=cur();var cls,signCh="",numStr="",pickCls="",pend=false;
    if(m.settled){
      if(refd){cls="zero";signCh="";numStr="0";}
      else if(b.team===m.winner){var net=(c.payouts[p.id]||0)-stake;totalNet+=net;cls="pos";pickCls="pos";signCh="+";numStr=fmt1(net);}
      else{totalNet+=-stake;cls="neg";pickCls="neg";signCh="−";numStr=fmt1(stake);}
    } else { cls="zero";pend=true; }
    return {m:m,b:b,c:c,refd:refd,bcur:bcur,cls:cls,signCh:signCh,numStr:numStr,pickCls:pickCls,pend:pend};
  });
  var maxNL=1;pre.forEach(function(r){if(r.numStr.length>maxNL)maxNL=r.numStr.length;});
  var hasAuto=pre.some(function(r){return !!(r.b&&r.b.auto);});
  var nameCh=1;pre.forEach(function(r){var a=(r.m.teamA||"").length,bb=(r.m.teamB||"").length+(r.b.team==="X"?6:0);if(a>nameCh)nameCh=a;if(bb>nameCh)nameCh=bb;});
  var hgW='calc('+(nameCh+2)+'ch'+(hasAuto?' + 1.5em':'')+')';
  var hgAlign="left";
  var items=pre.map(function(r){
    var m=r.m,b=r.b,c=r.c,pickCls=r.pickCls;
    var tA='<span'+(b.team==="A"&&pickCls?' class="net '+pickCls+'"':'')+' dir="auto">'+esc(m.teamA)+'</span>';
    var tB='<span'+(b.team==="B"&&pickCls?' class="net '+pickCls+'"':'')+' dir="auto">'+esc(m.teamB)+'</span>';
    var xTag=b.team==="X"?'<span'+(pickCls?' class="net '+pickCls+'"':'')+'> · תיקו</span>':'';
    var rbA=hasAuto?'<span style="display:inline-block;width:1.5em;text-align:center;opacity:.7">'+(b.auto?'🤖':'')+'</span>':'';
    var rbB=hasAuto?'<span style="display:inline-block;width:1.5em"></span>':'';
    var refTag=(m.settled&&r.refd)?'<span class="net zero" style="font-size:12px;margin-inline-end:8px">'+(m.winner==="VOID"?"↩ בוטל":(m.winner==="X"?"↩ תיקו":"↩ החזר"))+'</span>':'';
    var lineSty='display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:'+hgAlign;
    var amt=r.pend?'<span class="net zero hgn">⏳</span>':'<span class="net '+r.cls+' hgn"><span class="hsg">'+r.signCh+'</span><span class="hnv" style="width:'+maxNL+'ch">'+r.numStr+'</span> '+r.bcur+'</span>';
    return '<div class="hist"><div class="ht"><span class="hg lng" dir="auto" style="width:'+hgW+';flex:0 0 auto"><span style="'+lineSty+'">'+rbA+tA+'</span><span style="'+lineSty+'">'+rbB+tB+xTag+'</span></span><span style="display:flex;align-items:center">'+refTag+amt+'</span></div></div>';
  }).join("");
  var st=statsFor(p.id);var bal=st.balance;var deposited=depOf(p);var withdrawn=wdOf(p);
  var BK=Number(S.meta.bank)||0; var balCol=bal>BK?"var(--pitch-d)":(bal<BK?"var(--red)":"var(--tx)");
  var stakedBlock='<div><div class="tiny muted" style="font-weight:700">בהימור</div><div class="num" style="font-size:22px;font-weight:800;color:var(--tx)">'+fmt1(st.pending)+' '+cur()+'</div></div>';
  var header='<div class="card card-p" style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:10px">'+
    stakedBlock+
    '<div style="text-align:center"><div class="tiny muted" style="font-weight:700">הפקדה</div><div style="font-size:22px;font-weight:800;color:var(--pitch-d);white-space:nowrap" dir="ltr"><span style="font-size:16px;vertical-align:2px">📥</span> '+fmt1(deposited)+' '+cur()+'</div>'+(withdrawn>0.001?('<div style="font-size:12.5px;font-weight:800;color:var(--red);white-space:nowrap;margin-top:2px" dir="ltr"><span style="font-size:12.5px">📤</span> '+fmt1(withdrawn)+' '+cur()+'</div>'):'')+'</div>'+
    '<div style="text-align:left"><div class="tiny muted" style="font-weight:700">יתרה</div><div class="num" style="font-size:22px;font-weight:800;color:'+balCol+'">'+fmt1(bal)+' '+cur()+'</div></div>'+
    '</div>';
  $("#main").innerHTML='<section class="view active">'+header+(items||'<div class="card"><div class="empty"><div class="em-ic">🧾</div>עדיין לא הימרת על אף משחק.</div></div>')+'</section>';
}

/* ---------- 🔍 בדיקת תקינות: аудит инвариантов по ЖИВОЙ базе ---------- */
function integrityScan(t){
  var issues=[],EPS=0.011;
  t=t||{};
  var P=t.players||{},M=t.matches||{},B=t.bets||{},meta=t.meta||{},bank=Number(meta.bank)||0;
  // матчи со ставками (без id -> calcMatch считает заново, мимо кэша)
  var matches=[];for(var mid in M){var mm=M[mid]||{};var mo={mid:mid,settled:!!mm.settled,winner:(mm.winner||null),teamA:mm.teamA,teamB:mm.teamB,drawOK:mm.drawOK,bets:(B[mid]||{})};mo._c=mo.settled?calcMatch({settled:true,winner:mo.winner,bets:mo.bets}):null;matches.push(mo);}
  function nm(m){return (m.teamA||"?")+"–"+(m.teamB||"?");}
  function dep(p){if(!p)return 0;if(p.dep!=null)return Number(p.dep);if(p.bal0!=null)return Number(p.bal0)+(Number(p.wd)||0);return (p.feePaid===false)?0:bank;}
  function balOf(pid,p){var staked=0,won=0,pend=0;matches.forEach(function(m){var b=(m.bets||{})[pid];if(!b)return;var st=Number(b.stake)||0;staked+=st;if(m.settled)won+=((m._c&&m._c.payouts[pid])||0);else pend+=st;});var start=dep(p)-(Number(p.wd)||0);return{start:start,balance:start-staked+won,pending:pend};}

  // E1: сохранение тотализатора по каждому сведённому матчу + валидность результата
  matches.forEach(function(m){
    if(!m.settled)return;
    if(["A","B","X","VOID"].indexOf(m.winner)<0){issues.push({level:"err",msg:"משחק סומן כגמור ללא תוצאה תקינה: "+nm(m)});return;}
    var pool=0,pay=0;
    for(var k in m.bets)pool+=Number(m.bets[k].stake)||0;
    for(var k2 in (m._c?m._c.payouts:{}))pay+=Number(m._c.payouts[k2])||0;
    if(Math.abs(pay-pool)>EPS)issues.push({level:"err",msg:"מאזן משחק לא נשמר: "+nm(m)+" · קופה "+fmt(pool)+" ≠ תשלומים "+fmt(pay)});
  });

  // E2: глобальное сохранение денег (Σ депозитов = Σ балансов + ожидающие)
  var sStart=0,sBalPend=0,nP=0;
  for(var id in P){nP++;var b=balOf(id,P[id]);sStart+=b.start;sBalPend+=b.balance+b.pending;}
  if(Math.abs(sStart-sBalPend)>EPS)issues.push({level:"err",msg:"מאזן כללי לא נשמר: סך הפקדות "+fmt(sStart)+" ≠ סך יתרות+ממתינות "+fmt(sBalPend)+" (פער "+fmt(sStart-sBalPend)+")"});

  // E3: сироты-ставки (на удалённый матч / от удалённого участника)
  for(var bmid in B){
    if(!M[bmid]){issues.push({level:"err",msg:"הימורים על משחק שכבר נמחק (mid "+bmid+")"});continue;}
    for(var bpid in B[bmid]){if(!P[bpid])issues.push({level:"err",msg:"הימור של משתתף שלא קיים — משחק "+((M[bmid]&&M[bmid].teamA)||"?")+"–"+((M[bmid]&&M[bmid].teamB)||"?")});}
  }

  // E5: выбывшие — нет открытых ставок и сохранённый exitBal совпадает с пересчётом
  for(var eid in P){var ep=P[eid];if(!ep.exited)continue;var eb=balOf(eid,ep);
    if(eb.pending>EPS)issues.push({level:"err",msg:(ep.name||eid)+" (יצא) עם הימור פתוח שלא בוטל · "+fmt(eb.pending)+" ₪"});
    if(ep.exitBal!=null&&Math.abs(Number(ep.exitBal)-eb.balance)>EPS)issues.push({level:"warn",msg:"יתרת יציאה שמורה ("+fmt(ep.exitBal)+") ≠ מחושבת ("+fmt(eb.balance)+") · "+(ep.name||eid)});
  }

  // W1: отрицательный баланс активного
  for(var wid in P){var wp=P[wid];if(wp.exited)continue;var wb=balOf(wid,wp);if(wb.balance<-EPS)issues.push({level:"warn",msg:"יתרה שלילית: "+(wp.name||wid)+" · "+fmt(wb.balance)+" ₪"});}
  // W6: «מצב דמו» (לא שילם) עם הימור פתוח — מקור נפוץ ליתרה שלילית; אחרי ביטול שולם ההימורים אמורים להתבטל
